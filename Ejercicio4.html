<!DOCTYPE html>
<html lang="es-ES">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ejercicio - Método de Bisección</title>

  <body style="font-family: Arial, sans-serif; margin: 20px;">
    <h1>Método de la Bisección (JavaScript)</h1>
    <p>Abre la consola del navegador (Inspeccionar → Consola) para ver la salida.</p>

    <script>
      // ------------------------------------------------------------
      // FUNCIÓN AUXILIAR 1: comprueba si en [a,b] hay un cambio de signo
      // (Esto satisface el requisito: "debe llamar a otra función creada")
      // ------------------------------------------------------------
      function hayRaizEnIntervalo(f, a, b) {
        return f(a) * f(b) < 0;
      }

      // ------------------------------------------------------------
      // FUNCIÓN AUXILIAR 2: calcula el punto medio
      // (Otra auxiliar opcional, también sirve para "llamar a otra función")
      // ------------------------------------------------------------
      function puntoMedio(a, b) {
        return (a + b) / 2;
      }

      // ------------------------------------------------------------
      // FUNCIÓN PRINCIPAL: Método de la Bisección
      // Prototipo pedido: Biseccion(f, a, b, n)
      //
      // f: función continua
      // a: extremo inferior del intervalo
      // b: extremo superior del intervalo
      // n: número de iteraciones
      //
      // Devuelve un objeto con:
      //  - raizAprox: aproximación de la raíz
      //  - intervalo: intervalo final [a,b]
      // ------------------------------------------------------------
      function Biseccion(f, a, b, n) {

        // 1) Comprobación de que existe una raíz en el intervalo
        if (!hayRaizEnIntervalo(f, a, b)) {
          console.log("ERROR: No se garantiza raíz en [" + a + ", " + b + "].");
          console.log("Hace falta que f(a)*f(b) < 0.");
          return null; // No seguimos
        }

        // 2) Iteraciones del método
        for (let i = 1; i <= n; i++) {
          // Calculamos el punto medio
          const m = puntoMedio(a, b);

          // Mostramos la info de cada iteración en consola
          console.log(
            "Iter " + i +
            " | a=" + a.toFixed(6) +
            " b=" + b.toFixed(6) +
            " m=" + m.toFixed(6) +
            " f(m)=" + f(m).toFixed(6)
          );

          // Si f(m) es 0 (o muy cercano), ya hemos encontrado la raíz
          if (Math.abs(f(m)) < 1e-12) {
            return { raizAprox: m, intervalo: [a, b], iteraciones: i };
          }

          // Si hay cambio de signo entre [a,m], la raíz está ahí
          if (hayRaizEnIntervalo(f, a, m)) {
            b = m;
          } else {
            // Si no, entonces está en [m,b]
            a = m;
          }
        }

        // 3) Al acabar n iteraciones, devolvemos el punto medio como aproximación
        const raiz = puntoMedio(a, b);
        return { raizAprox: raiz, intervalo: [a, b], iteraciones: n };
      }

      // ------------------------------------------------------------
      // PRUEBAS (recomendado usar consola)
      // ------------------------------------------------------------

      // Ejemplo de función no lineal: f(x) = x^3 - x - 2
      // Tiene una raíz en [1,2] porque f(1)=-2 y f(2)=4 => producto < 0
      function f1(x) {
        return x**3 - x - 2;
      }

      console.log("==== PRUEBA 1: f(x)=x^3 - x - 2 en [1,2], n=25 ====");
      const res1 = Biseccion(f1, 1, 2, 25);
      console.log("Resultado:", res1);

      // Otro ejemplo: f(x)=cos(x)-x tiene raíz en [0,1]
      function f2(x) {
        return Math.cos(x) - x;
      }

      console.log("==== PRUEBA 2: f(x)=cos(x)-x en [0,1], n=25 ====");
      const res2 = Biseccion(f2, 0, 1, 25);
      console.log("Resultado:", res2);
    </script>
  </body>
</html>
